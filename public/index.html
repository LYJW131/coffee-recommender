<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coffee Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --brown-dark: #3C2415;
      --brown-mid: #8B5E3C;
      --brown-light: #D4A574;
      --cream: #F5E6D3;
      --cream-dark: #E8D4BC;
      --white: #FDF8F3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Lora', Georgia, serif;
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 50%, var(--brown-light) 100%);
      color: var(--brown-dark);
      padding: 1.5rem;
    }
    .page {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 700;
      text-align: center;
      margin: 0 0 0.5rem;
      color: var(--brown-dark);
    }
    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--brown-mid);
      margin-bottom: 1.75rem;
    }
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 16px rgba(60, 36, 21, 0.08);
      border: 1px solid rgba(212, 165, 116, 0.4);
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--brown-mid);
    }
    .slider-row {
      margin-bottom: 1.25rem;
    }
    .slider-row:last-child { margin-bottom: 0; }
    .slider-row .slider-label {
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
    }
    .slider-wrap {
      position: relative;
      padding-top: 1.5rem;
    }
    .slider-wrap .value-bubble {
      position: absolute;
      top: 0;
      font-weight: 600;
      color: var(--brown-mid);
      font-size: 0.9rem;
      transform: translateX(-50%);
      min-width: 1.5em;
      text-align: center;
      pointer-events: none;
    }
    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--cream-dark);
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brown-mid);
      cursor: pointer;
      border: 2px solid var(--white);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brown-mid);
      cursor: pointer;
      border: 2px solid var(--white);
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }
    .options label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .options input[type="checkbox"],
    .options input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--brown-mid);
      cursor: pointer;
    }
    .milk-group { margin-top: 0.75rem; }
    .milk-group .options { margin-top: 0.5rem; }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      border: 1px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--white);
      color: var(--brown-dark);
      resize: vertical;
    }
    textarea::placeholder { color: var(--brown-light); }
    textarea:focus {
      outline: none;
      border-color: var(--brown-mid);
      box-shadow: 0 0 0 2px rgba(139, 94, 60, 0.2);
    }
    .char-count {
      text-align: right;
      font-size: 0.8rem;
      color: var(--brown-mid);
      margin-top: 0.35rem;
    }
    .char-count.over { color: #a63d3d; }
    .btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      background: var(--brown-mid);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover:not(:disabled) {
      background: var(--brown-dark);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result {
      margin-top: 1.25rem;
      padding: 1.25rem;
      background: var(--cream);
      border-radius: 10px;
      border-left: 4px solid var(--brown-mid);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .result #resultText h3 { font-size: 1rem; margin: 1em 0 0.4em; }
    .result #resultText h3:first-child { margin-top: 0; }
    .result #resultText strong { color: var(--brown-dark); }
    .result #resultText ul { margin: 0.35em 0; padding-left: 1.4em; }
    .typing-cursor {
      display: inline-block;
      margin-left: 2px;
      font-weight: 700;
      color: var(--brown-mid);
      animation: cursorBlink 1s steps(1) infinite;
    }
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .result.empty { display: none; }
    .error-msg {
      color: #a63d3d;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .flavor-section { margin-bottom: 1rem; }
    @media (max-width: 640px) {
      body {
        padding: 0.6rem;
      }
      .card {
        padding: 1.2rem 1rem;
      }
      .subtitle {
        margin-bottom: 1rem;
      }
      textarea,
      input,
      select,
      button {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>☕ AI Coffee Recommender</h1>
    <p class="subtitle">Find the best coffee for your taste</p>

    <form id="form" class="card">
      <h2>Taste Preferences</h2>
      <div class="slider-row">
        <div class="slider-label">Sweetness</div>
        <div class="slider-wrap">
          <span class="value-bubble" id="sweetnessVal">5/10</span>
          <input type="range" id="sweetness" name="sweetness" min="0" max="10" value="5">
        </div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Strength</div>
        <div class="slider-wrap">
          <span class="value-bubble" id="strengthVal">5/10</span>
          <input type="range" id="strength" name="strength" min="0" max="10" value="5">
        </div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Temperature</div>
        <div class="slider-wrap">
          <span class="value-bubble" id="temperatureVal" data-labels="Iced,Warm,Hot">Warm</span>
          <input type="range" id="temperature" name="temperature" min="1" max="3" value="2" data-labels="Iced,Warm,Hot">
        </div>
      </div>
      <div class="slider-row">
        <div class="slider-label">Caffeine</div>
        <div class="slider-wrap">
          <span class="value-bubble" id="caffeineVal" data-labels="Low,Medium,High">Medium</span>
          <input type="range" id="caffeine" name="caffeine" min="1" max="3" value="2" data-labels="Low,Medium,High">
        </div>
      </div>

      <div class="flavor-section">
        <h2>Flavor Notes (multi-select)</h2>
        <div class="options" role="group" aria-label="Flavor notes">
          <label><input type="checkbox" name="flavor" value="Milky"> Milky</label>
          <label><input type="checkbox" name="flavor" value="Fruity"> Fruity</label>
          <label><input type="checkbox" name="flavor" value="Nutty"> Nutty</label>
          <label><input type="checkbox" name="flavor" value="Chocolatey"> Chocolatey</label>
          <label><input type="checkbox" name="flavor" value="Floral"> Floral</label>
        </div>
      </div>
      <div class="milk-group">
        <h2>Milk Type</h2>
        <div class="options" role="group" aria-label="Milk type">
          <label><input type="radio" name="milk" value="No milk"> No milk</label>
          <label><input type="radio" name="milk" value="Whole milk" checked> Whole milk</label>
          <label><input type="radio" name="milk" value="Skim milk"> Skim milk</label>
          <label><input type="radio" name="milk" value="Oat milk"> Oat milk</label>
          <label><input type="radio" name="milk" value="Coconut milk"> Coconut milk</label>
        </div>
      </div>

      <div style="margin-top: 1.25rem;">
        <h2>Extra Notes</h2>
        <textarea id="extraNotes" name="extraNotes" placeholder="Example: no sugar, light roast, no foam..." maxlength="200"></textarea>
        <div class="char-count" id="charCount">0 / 200</div>
      </div>

      <button type="submit" class="btn" id="submitBtn" style="margin-top: 1.5rem;">Get Recommendation</button>
      <div class="error-msg" id="formError" style="display:none;"></div>
    </form>

    <div class="card result empty" id="resultCard">
      <h2>Recommendations</h2>
      <div id="resultText"></div>
    </div>
  </div>

  <script>
    const MAX_EXTRA = 200;
    const VALID_FLAVORS = ['Milky', 'Fruity', 'Nutty', 'Chocolatey', 'Floral'];
    const VALID_MILK = ['No milk', 'Whole milk', 'Skim milk', 'Oat milk', 'Coconut milk'];

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function sanitizeExtra(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/[<>\"'&]/g, '').replace(/\s+/g, ' ').trim().slice(0, MAX_EXTRA);
    }

    const sweetnessEl = document.getElementById('sweetness');
    const strengthEl = document.getElementById('strength');
    const temperatureEl = document.getElementById('temperature');
    const caffeineEl = document.getElementById('caffeine');
    const extraNotesEl = document.getElementById('extraNotes');
    const charCountEl = document.getElementById('charCount');
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    let isImeComposing = false;

    function scrollToResult() {
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateExtraNotesView(rawValue) {
      const sanitized = sanitizeExtra(rawValue);
      if (rawValue !== sanitized) extraNotesEl.value = sanitized;
      const len = sanitized.length;
      charCountEl.textContent = len + ' / ' + MAX_EXTRA;
      charCountEl.classList.toggle('over', len >= MAX_EXTRA);
    }
    function updateBubble(slider, bubble) {
      const min = parseFloat(slider.min) || 0;
      const max = parseFloat(slider.max) || 10;
      const val = Math.round(Number(slider.value));
      const pct = min === max ? 50 : ((val - min) / (max - min)) * 100;
      bubble.style.left = pct + '%';
      if (bubble.dataset.labels) {
        const labels = bubble.dataset.labels.split(',');
        bubble.textContent = labels[val - 1] || '';
      } else {
        bubble.textContent = max === 10 ? val + '/10' : String(val);
      }
    }
    function setupSlider(sliderId, bubbleId) {
      const slider = document.getElementById(sliderId);
      const bubble = document.getElementById(bubbleId);
      if (!slider || !bubble) return;
      const update = () => {
        const v = Math.round(Number(slider.value));
        slider.value = v;
        updateBubble(slider, bubble);
      };
      slider.addEventListener('input', update);
      update();
    }
    setupSlider('sweetness', 'sweetnessVal');
    setupSlider('strength', 'strengthVal');
    setupSlider('temperature', 'temperatureVal');
    setupSlider('caffeine', 'caffeineVal');

    extraNotesEl.addEventListener('compositionstart', () => {
      isImeComposing = true;
    });
    extraNotesEl.addEventListener('compositionend', () => {
      isImeComposing = false;
      updateExtraNotesView(extraNotesEl.value);
    });
    extraNotesEl.addEventListener('input', (e) => {
      if (isImeComposing || e.isComposing) {
        const len = extraNotesEl.value.length;
        charCountEl.textContent = len + ' / ' + MAX_EXTRA;
        charCountEl.classList.toggle('over', len >= MAX_EXTRA);
        return;
      }
      updateExtraNotesView(extraNotesEl.value);
    });
    // Enter submits form; Shift+Enter keeps newline in textarea.
    extraNotesEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && !isImeComposing && e.keyCode !== 229) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    function getPayload() {
      const flavors = Array.from(document.querySelectorAll('input[name="flavor"]:checked'))
        .map((el) => el.value)
        .filter((v) => VALID_FLAVORS.includes(v));
      const milkEl = document.querySelector('input[name="milk"]:checked');
      const milk = milkEl && VALID_MILK.includes(milkEl.value) ? milkEl.value : 'Whole milk';
      const extraNotes = sanitizeExtra(extraNotesEl.value);

      return {
        sweetness: Math.min(10, Math.max(0, parseInt(sweetnessEl.value, 10) || 5)),
        strength: Math.min(10, Math.max(0, parseInt(strengthEl.value, 10) || 5)),
        temperature: Math.min(3, Math.max(1, parseInt(temperatureEl.value, 10) || 2)),
        caffeine: Math.min(3, Math.max(1, parseInt(caffeineEl.value, 10) || 2)),
        flavors,
        milk,
        extraNotes,
      };
    }

    function renderMarkdown(text) {
      const raw = (text || '').trim();
      if (!raw) return '';
      if (typeof marked !== 'undefined') {
        return marked.parse ? marked.parse(raw) : marked(raw);
      }
      return escapeHtml(raw).replace(/\n/g, '<br>');
    }

    function renderStreamingMarkdown(text, withCursor) {
      const html = renderMarkdown(text);
      if (!withCursor) return html;
      return html + '<span class="typing-cursor">▍</span>';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.style.display = 'none';
      formError.textContent = '';
      resultCard.classList.add('empty');

      const payload = getPayload();
      submitBtn.disabled = true;
      resultCard.classList.remove('empty');
      resultText.textContent = 'Generating recommendations...';
      scrollToResult();

      try {
        const res = await fetch('/api/recommend/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const errText = await res.text();
          let errMsg = 'Request failed. Please try again.';
          try {
            const errJson = JSON.parse(errText);
            errMsg = errJson.error || errMsg;
          } catch (_) {
            if (errText.trim()) errMsg = errText.trim();
          }
          formError.textContent = errMsg;
          formError.style.display = 'block';
          resultCard.classList.add('empty');
          return;
        }

        if (!res.body) {
          formError.textContent = 'Streaming is not supported in this browser.';
          formError.style.display = 'block';
          resultCard.classList.add('empty');
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let streamBuffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          streamBuffer += decoder.decode(value, { stream: true });
          const lines = streamBuffer.split('\n');
          streamBuffer = lines.pop() || '';

          for (const line of lines) {
            const row = line.trim();
            if (!row) continue;
            let payloadRow;
            try {
              payloadRow = JSON.parse(row);
            } catch (_) {
              continue;
            }

            if (payloadRow.error) {
              throw new Error(payloadRow.error);
            }
            if (payloadRow.delta) {
              fullText += payloadRow.delta;
              resultText.innerHTML = renderStreamingMarkdown(fullText, true);
              scrollToResult();
            }
          }
        }

        resultText.innerHTML = renderStreamingMarkdown(fullText, false);
        scrollToResult();
      } catch (err) {
        formError.textContent = err?.message || 'Network error. Please check your connection and try again.';
        formError.style.display = 'block';
        resultCard.classList.add('empty');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
